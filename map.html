<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта RPM</title>
    <link rel="icon" href="img/UniLogo.png" type="image/png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: #1e1e24;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            position: fixed;
        }

        #map {
            height: 100vh;
            height: 100dvh;
            width: 100%;
            background: #1E3B71;
        }

        .leaflet-bottom {
            bottom: 140px !important;
        }

        .custom-marker {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .marker-pin {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff5722;
            border: 3px solid #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .marker-pin:hover {
            transform: scale(1.3);
            background: #ff7043;
        }

        .leaflet-popup-content-wrapper {
            background: rgba(25px, 25px, 25px, 0.95) !important;
            color: #fff !important;
            border-radius: 12px !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px;
        }

        .leaflet-popup-tip {
            background: rgba(25px, 25px, 25px, 0.95) !important;
        }

        .popup-container h3 {
            margin: 0 0 6px 0;
            font-size: 16px;
            color: #ffaa44;
        }

        .popup-container p {
            margin: 0;
            font-size: 13px;
            color: #e0e0e0;
            line-height: 1.4;
        }

        .bottom-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 20px;
            overflow-x: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            scroll-behavior: smooth;
        }

        .bottom-panel::-webkit-scrollbar {
            height: 6px;
        }

        .bottom-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .place-card {
            flex: 0 0 210px;
            height: 80px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #fff;
            padding: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
            user-select: none;
        }

        .place-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffaa44;
            transform: translateY(-4px);
        }

        .place-card h4 {
            margin: 0 0 4px 0;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .place-card p {
            margin: 0;
            font-size: 11px;
            color: #b0b0b5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .leaflet-bar a {
            width: 44px !important;
            height: 44px !important;
            line-height: 44px !important;
        }

        .leaflet-tile-container img,
        .leaflet-image-layer {
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <div id="bottom-panel" class="bottom-panel"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const imgWidth = 3303;
        const imgHeight = 2883;
        const imgUrl = 'map.png';
        const bounds = [[0, 0], [imgHeight, imgWidth]];

        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -2.5,
            maxZoom: 2.5,
            attributionControl: false,
            maxBounds: bounds,
            maxBoundsViscosity: 1.0,
            tap: true,
            bounceAtZoomLimits: false
        });

        L.imageOverlay(imgUrl, bounds, { interactive: false }).addTo(map);
        map.fitBounds(bounds);

        const locations = [
            {
                id: 1,
                name: "Мэрия",
                coords: [13459, 10137],
                color: "#ffcc00"
            },
            {
                id: 2,
                name: "Больница",
                coords: [14350, 10380],
                color: "#ff0000"
            },
            {
                id: 3,
                name: "Армия",
                coords: [14492, 10243],
                color: "#ff3c00"
            },
            {
                id: 4,
                name: "СМИ",
                coords: [13882, 10379],
                color: "#109e00"
            },
            {
                id: 5,
                name: "Полиция",
                coords: [13188, 10740],
                color: "#0004ff"
            },
            {
                id: 6,
                name: "Опасный район",
                coords: [14043, 11264],
                color: "#000000"
            },
            {
                id: 7,
                name: "Университет",
                coords: [12483, 11212],
                color: "#ff8400"
            },
            {
                id: 8,
                name: "FBI",
                coords: [13638, 13460],
                color: "#0f0085"
            },
            {
                id: 9,
                name: "Бар",
                coords: [13411, 7224],
                color: "#70ff73"
            },
            {
                id: 10,
                name: "Библиотека",
                coords: [11059, 10770],
                color: "#b8b8b8"
            }
        ];

        function getMapLatLng(coords) {
            return map.unproject([coords[1], imgHeight - coords[0]], map.getMaxZoom());
        }

        const markersMap = {};
        const panelContainer = document.getElementById('bottom-panel');

        locations.forEach(place => {
            const latLngCoords = getMapLatLng(place.coords);

            const customIcon = L.divIcon({
                className: 'custom-marker',
                html: `<div class="marker-pin" style="background-color: ${place.color}; box-shadow: 0 0 12px ${place.color};"></div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });

            const popupContent = `
                <div class="popup-container">
                    <h3 style="color: ${place.color};">${place.name}</h3>
                </div>
            `;

            const marker = L.marker(latLngCoords, { icon: customIcon })
                .bindPopup(popupContent, { offset: [0, -5] })
                .addTo(map);

            markersMap[place.id] = marker;

            const card = document.createElement('div');
            card.className = 'place-card';
            card.innerHTML = `
                <h4>${place.name}</h4>
            `;

            card.addEventListener('click', () => {
                map.setView(latLngCoords, 0.5, { animate: true, duration: 1 });
                setTimeout(() => {
                    marker.openPopup();
                }, 400);
            });

            panelContainer.appendChild(card);
        });

        window.addEventListener('resize', () => {
            map.invalidateSize();
            map.fitBounds(bounds);
        });
    </script>
</body>

</html>
